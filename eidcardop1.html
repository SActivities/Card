<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>جمعية جذورنا الثقافية </title>
  <link rel="icon" href="logo2.png" type="image/png"> 
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <img src="logo.png" alt="Logo" class="logo">
    <h1>صمّم بطاقتك</h1>
  </header>

  <main class="container">

    <section class="design-section">
      <h3>اختر التصميم</h3>
      <div class="designs">
        <img src="eiddesignop11.png" onclick="selectDesign(this)">
        <img src="eiddesignop21.png" onclick="selectDesign(this)">
        <img src="eiddesignop31.png" onclick="selectDesign(this)">
        <img src="eiddesignop41.png" onclick="selectDesign(this)">
        <img src="eiddesignop51.png" onclick="selectDesign(this)">
        <img src="eiddesignop61.png" onclick="selectDesign(this)">
        <img src="eiddesignop71.png" onclick="selectDesign(this)">
        <img src="eiddesignop81.png" onclick="selectDesign(this)">
        <img src="eiddesignop91.png" onclick="selectDesign(this)">
        <img src="eiddesignop101.png" onclick="selectDesign(this)">
      </div>
    </section>

    <section class="editor-section">
    <label class="text-label">اختر النص </label>
      
    <select id="presetTextSelect">
    <option value="" disabled selected>اختر النص هنا</option>

    <option 
    value="تقبّل الله طاعتكم، وأتمّ عليكم نعمته، وجعل عيدكم سرورًا موصولًا برضوانه، وأعاد هذه الأيام عليكم وأنتم في أتمّ عافية وأوسع فضل.">
    تقبّل الله طاعتكم، وأتمّ عليكم نعمته، وجعل عيدكم سرورًا موصولًا برضوانه، وأعاد هذه الأيام عليكم وأنتم في أتمّ عافية وأوسع فضل.
    </option>

    <option 
    value="جعل الله لكم من فجر العيد نورًا، ومن الأضحى سرورًا، ومن الدعاء قبولًا، ومن الطاعة رفعةً ووصالًا.">
    جعل الله لكم من فجر العيد نورًا، ومن الأضحى سرورًا، ومن الدعاء قبولًا، ومن الطاعة رفعةً ووصالًا.
    </option>

    <option 
    value="هذا يومٌ أشرقت فيه مواسم الرحمة، وتعطّرت بأنفاس الطاعة، فأسأل الله أن يكسوكم فيه لباس الرضا، ويكتب لكم من الخير أوفر الحظ والنصيب.">
    هذا يومٌ أشرقت فيه مواسم الرحمة، وتعطّرت بأنفاس الطاعة، فأسأل الله أن يكسوكم فيه لباس الرضا، ويكتب لكم من الخير أوفر الحظ والنصيب.
    </option>

    <option 
    value="أهنئكم بعيدٍ جعله الله شعارًا للتوحيد، ومظهرًا للفرح المشروع، فبارك الله لكم في أيامكم، وأدام عليكم المسرّات.">
    أهنئكم بعيدٍ جعله الله شعارًا للتوحيد، ومظهرًا للفرح المشروع، فبارك الله لكم في أيامكم، وأدام عليكم المسرّات.
    </option>

    <option 
    value="حلّ العيدُ ضيفًا كريمًا، يحمل للنفوس بشائر الرحمة، وللقلوب أنس اللقاء، فأهدي إليكم تهنئةً يعبق بها الودّ، مقرونةً بصادق الدعوات أن يبارك الله لكم في الأهل والعمر والعمل.">
    حلّ العيدُ ضيفًا كريمًا، يحمل للنفوس بشائر الرحمة، وللقلوب أنس اللقاء، فأهدي إليكم تهنئةً يعبق بها الودّ، مقرونةً بصادق الدعوات أن يبارك الله لكم في الأهل والعمر والعمل.
    </option>

    <option 
    value="تقبّل الله من الحجيج حجّهم، ومن المسلمين صالح أعمالهم، وجعل عيدكم مغفرةً ورحمةً وعتقًا من النار.">
    تقبّل الله من الحجيج حجّهم، ومن المسلمين صالح أعمالهم، وجعل عيدكم مغفرةً ورحمةً وعتقًا من النار.
    </option>

    </select>


      <label class="color-label">اكتب أو عدل النص</label>
      <input
       type="text"
       id="textInput"
       placeholder="اكتب النص هنا"
       />

      <label class="color-label">من ( اختياري )</label>
      <input
       type="text"
       id="fromInput"
       placeholder="اكتب اسم المرسل هنا"
       />

      <label class="color-label">إلى ( اختياري )</label>
      <input
       type="text"
       id="toInput"
       placeholder="اكتب اسم المرسل إليه هنا"
       /> 

      <label class="font-label">اختر نوع الخط</label>
      <select id="fontSelect">
      <option value="Amiri" disabled selected>اختر نوع النص هنا</option>
      <option value="Cairo">Cairo</option>
      <option value="Amiri">Amiri</option>
      <option value="Tajawal">Tajawal</option>
      <option value="Changa">Changa</option>
      </select>

     <label class="color-label">اختر لون النص</label>
      <input
        type="color"
        id="colorInput"
        value="#000000"
      />
      
      <div class="buttons">
        <button onclick="generate()">معاينة</button>
        <button class="download" onclick="download()">تحميل</button>
      </div>

      <div class="canvas-wrapper">
        <canvas id="canvas" width="675" height="1200"></canvas>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>

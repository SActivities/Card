<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>جمعية جذورنا الثقافية </title>
  <link rel="icon" href="logo2.png" type="image/png"> 
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <img src="logo.png" alt="Logo" class="logo">
    <h1>صمّم بطاقتك</h1>
  </header>

  <main class="container">

    <section class="design-section">
      <h3>اختر التصميم</h3>
      <div class="designs">
        <img src="eiddesignop1.png" onclick="selectDesign(this)">
        <img src="eiddesignop2.png" onclick="selectDesign(this)">
        <img src="eiddesignop3.png" onclick="selectDesign(this)">
        <img src="eiddesignop4.png" onclick="selectDesign(this)">
        <img src="eiddesignop5.png" onclick="selectDesign(this)">
        <img src="eiddesignop6.png" onclick="selectDesign(this)">
      </div>
    </section>

    <section class="editor-section">
    <label class="text-label">اختر النص </label>
      
    <select id="presetTextSelect">
    <option value="" disabled selected>اختر النص هنا</option>

    <option 
    value="" 
    data-ref="">
    </option>

    <option 
    value="«جعل اللهُ عيدكم عيدَ بركةٍ ومغفرة، وألبسكم فيه لباس العافية.»" 
    data-ref="📚 المصدر: لطائف المعارف فيما لمواسم العام من الوظائف.">
    «جعل اللهُ عيدكم عيدَ بركةٍ ومغفرة، وألبسكم فيه لباس العافية.»
    </option>

    <option 
    value="هنّأك اللهُ بالعيد، وتقبَّل طاعتك، وأتمَّ عليك نعمته." 
    data-ref="📚 المصدر: بهجة المجالس وأنس المجالس.">
    هنّأك اللهُ بالعيد، وتقبَّل طاعتك، وأتمَّ عليك نعمته.
    </option>

    <option 
    value="أعاده الله عليكم أعوامًا عديدة، وأزمنةً مديدة، وأنتم في خيرٍ وعافية" 
    data-ref="📚 المصدر: صبح الأعشى في صناعة الإنشاء">
    أعاده الله عليكم أعوامًا عديدة، وأزمنةً مديدة، وأنتم في خيرٍ وعافية
    </option>

    <option 
    value="«تقبَّلَ اللهُ صيامكم، وباركَ لكم في عيدكم»" 
    data-ref="📚 المصدر: لطائف المعارف فيما لمواسم العام من الوظائف">
    «تقبَّلَ اللهُ صيامكم، وباركَ لكم في عيدكم»
    </option>

    <option 
    value="«هنَّأكم اللهُ بالعيد، وأتمَّ عليكم النعمة»" 
    data-ref="📚 المصدر: رسائل البلغاء.">
    «هنَّأكم اللهُ بالعيد، وأتمَّ عليكم النعمة»
    </option>

    <option 
    value="أدام الله بهجة أعيادكم بقرب من تحبون، وطاب بكم العيد، ودمتم لأحبابكم أعياداً وأفراحاً." 
    data-ref="">
    أدام الله بهجة أعيادكم بقرب من تحبون، وطاب بكم العيد، ودمتم لأحبابكم أعياداً وأفراحاً.
    </option>

    <option 
    value="كل عيد وعين الله تحرسكم
    حتى يعود لكم بالخير أزماناً" 
    data-ref="">
    كل عيد وعين الله تحرسكم
    حتى يعود لكم بالخير أزماناً
    </option>


    <option 
    value="تقبل الله بالغفران طاعاتكم
    وزادكم بالتقى عزاً وإيماناً" 
    data-ref="">
    تقبل الله بالغفران طاعاتكم
    وزادكم بالتقى عزاً وإيماناً
    </option>
    </select>


      <label class="color-label">اكتب أو عدل النص</label>
      <input
       type="text"
       id="textInput"
       placeholder="اكتب النص هنا"
       />

      <label class="color-label">من ( اختياري )</label>
      <input
       type="text"
       id="fromInput"
       placeholder="اكتب اسم المرسل هنا"
       />

      <label class="color-label">إلى ( اختياري )</label>
      <input
       type="text"
       id="toInput"
       placeholder="اكتب اسم المرسل إليه هنا"
       /> 

      <label class="font-label">اختر نوع الخط</label>
      <select id="fontSelect">
      <option value="Amiri" disabled selected>اختر نوع النص هنا</option>
      <option value="Cairo">Cairo</option>
      <option value="Amiri">Amiri</option>
      <option value="Tajawal">Tajawal</option>
      <option value="Changa">Changa</option>
      </select>

     <label class="color-label">اختر لون النص</label>
      <input
        type="color"
        id="colorInput"
        value="#000000"
      />
      
      <div class="buttons">
        <button onclick="generate()">معاينة</button>
        <button class="download" onclick="download()">تحميل</button>
      </div>

      <div class="canvas-wrapper">
        <canvas id="canvas" width="675" height="1200"></canvas>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
